<!DOCTYPE html>
<html>
<head>
    <title>Facebook Link Example</title>
    <style>
        .facebook-btn {
            background-color: #1877f2;
            color: white;
            padding: 12px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
        }

        .facebook-btn:hover {
            background-color: #0d65d9;
        }
    </style>
</head>
<body>

    <h2>Visit Our Facebook Page</h2>

    <!-- Link to Facebook -->
    <a href="https://www.facebook.com" target="_blank" class="facebook-btn">
        Go to Facebook
    </a>

</body>
</html>
